<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RS3 Map Debugger</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: 'Consolas', 'Monaco', monospace; background: #1a1a2e; color: #e0e0e0; }

    #app {
      display: flex;
      height: 100%;
    }

    /* Left control panel */
    #controls {
      width: 280px;
      min-width: 280px;
      background: #16213e;
      border-right: 1px solid #0f3460;
      padding: 12px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      z-index: 1000;
    }

    #controls h2 {
      font-size: 14px;
      color: #e94560;
      border-bottom: 1px solid #0f3460;
      padding-bottom: 6px;
      margin-bottom: 4px;
    }

    #controls h3 {
      font-size: 12px;
      color: #53a8b6;
      margin-bottom: 4px;
    }

    .control-group {
      background: #1a1a3e;
      border: 1px solid #0f3460;
      border-radius: 4px;
      padding: 8px;
    }

    .plane-buttons {
      display: flex;
      gap: 4px;
    }

    .plane-btn {
      flex: 1;
      padding: 6px;
      background: #0f3460;
      color: #e0e0e0;
      border: 1px solid #53a8b6;
      border-radius: 3px;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      transition: all 0.15s;
    }

    .plane-btn.active {
      background: #e94560;
      border-color: #e94560;
      color: white;
    }

    .plane-btn:hover:not(.active) {
      background: #1a3a6e;
    }

    /* Layer toggles */
    .layer-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
    }

    .layer-toggle input[type="checkbox"] {
      accent-color: #e94560;
    }

    .layer-toggle label {
      font-size: 12px;
      cursor: pointer;
      flex: 1;
    }

    .filter-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }

    .layer-toggle .shortcut {
      font-size: 10px;
      color: #53a8b6;
      background: #0f3460;
      padding: 1px 5px;
      border-radius: 2px;
    }

    /* Offset controls */
    .offset-row {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 4px;
    }

    .offset-row label {
      font-size: 11px;
      width: 20px;
    }

    .offset-btn {
      padding: 3px 8px;
      background: #0f3460;
      color: #e0e0e0;
      border: 1px solid #53a8b6;
      border-radius: 2px;
      cursor: pointer;
      font-family: inherit;
      font-size: 11px;
    }

    .offset-btn:hover { background: #1a3a6e; }

    .offset-value {
      font-size: 11px;
      color: #53a8b6;
      min-width: 50px;
      text-align: center;
    }

    .flip-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
    }

    .flip-toggle label {
      font-size: 12px;
      cursor: pointer;
    }

    /* Map container */
    #map-container {
      flex: 1;
      position: relative;
    }

    #map {
      width: 100%;
      height: 100%;
      background: #0a0a1a;
    }

    /* Status bar */
    #status-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(22, 33, 62, 0.95);
      border-top: 1px solid #0f3460;
      padding: 6px 12px;
      font-size: 12px;
      z-index: 1000;
      display: flex;
      gap: 20px;
    }

    #status-bar .coord {
      color: #53a8b6;
    }

    #status-bar .value {
      color: #e0e0e0;
    }

    /* Transition edit tool */
    #transition-list {
      margin-top: 6px;
      max-height: 200px;
      overflow-y: auto;
    }

    .trans-row {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 3px 0;
      border-bottom: 1px solid #0f3460;
      font-size: 10px;
      line-height: 1.4;
    }

    .trans-row .trans-info {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .trans-row .trans-type {
      color: #53a8b6;
      font-weight: bold;
    }

    .trans-row .trans-side {
      color: #888;
      font-size: 9px;
    }

    .trans-del-btn {
      padding: 1px 5px;
      background: #8b0000;
      color: #ff6666;
      border: 1px solid #ff4444;
      border-radius: 2px;
      cursor: pointer;
      font-family: inherit;
      font-size: 9px;
      white-space: nowrap;
    }

    .trans-del-btn:hover { background: #aa0000; }

    .trans-move-btn {
      padding: 1px 5px;
      background: #0f3460;
      color: #53a8b6;
      border: 1px solid #53a8b6;
      border-radius: 2px;
      cursor: pointer;
      font-family: inherit;
      font-size: 9px;
      white-space: nowrap;
    }

    .trans-move-btn:hover { background: #1a3a6e; }

    #move-mode-banner {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      background: rgba(233, 69, 96, 0.9);
      color: white;
      padding: 8px 12px;
      font-size: 12px;
      font-family: 'Consolas', 'Monaco', monospace;
      z-index: 1001;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #move-mode-cancel {
      padding: 3px 10px;
      background: rgba(0,0,0,0.3);
      color: white;
      border: 1px solid rgba(255,255,255,0.5);
      border-radius: 3px;
      cursor: pointer;
      font-family: inherit;
      font-size: 11px;
    }

    #move-mode-cancel:hover { background: rgba(0,0,0,0.5); }

    #add-transition-form {
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px solid #0f3460;
    }

    #add-transition-form .form-row {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 3px;
    }

    #add-transition-form label {
      font-size: 10px;
      width: 40px;
      color: #888;
    }

    #add-transition-form input,
    #add-transition-form select {
      font-family: inherit;
      font-size: 10px;
      background: #0f3460;
      color: #e0e0e0;
      border: 1px solid #53a8b6;
      border-radius: 2px;
      padding: 2px 4px;
    }

    #add-transition-form input { flex: 1; }
    #add-transition-form select { flex: 1; }

    #add-transition-btn {
      width: 100%;
      padding: 4px;
      margin-top: 4px;
      background: #0f3460;
      color: #53a8b6;
      border: 1px solid #53a8b6;
      border-radius: 2px;
      cursor: pointer;
      font-family: inherit;
      font-size: 11px;
    }

    #add-transition-btn:hover { background: #1a3a6e; }

    #add-toggle {
      cursor: pointer;
      font-size: 11px;
      color: #53a8b6;
      user-select: none;
      margin-top: 4px;
    }

  </style>
</head>
<body>
  <div id="app">
    <div id="controls">
      <div>
        <h2>RS3 Map Debugger</h2>
        <span style="font-size: 11px; color: #666;">Leaflet + RuneApps CRS</span>
      </div>

      <div class="control-group">
        <h3>Plane</h3>
        <div class="plane-buttons">
          <button class="plane-btn active" data-plane="0">0</button>
          <button class="plane-btn" data-plane="1">1</button>
          <button class="plane-btn" data-plane="2">2</button>
          <button class="plane-btn" data-plane="3">3</button>
        </div>
      </div>

      <div class="control-group">
        <h3>Go To Coordinate</h3>
        <div style="display: flex; gap: 4px; align-items: center;">
          <input type="number" id="goto-x" placeholder="X" style="flex:1; font-family:inherit; font-size:11px; background:#0f3460; color:#e0e0e0; border:1px solid #53a8b6; border-radius:2px; padding:4px; width:60px;" />
          <input type="number" id="goto-y" placeholder="Y" style="flex:1; font-family:inherit; font-size:11px; background:#0f3460; color:#e0e0e0; border:1px solid #53a8b6; border-radius:2px; padding:4px; width:60px;" />
          <input type="number" id="goto-p" placeholder="P" value="0" style="width:32px; font-family:inherit; font-size:11px; background:#0f3460; color:#e0e0e0; border:1px solid #53a8b6; border-radius:2px; padding:4px;" />
          <button id="goto-btn" class="offset-btn" style="padding:4px 8px;">Go</button>
        </div>
      </div>

      <div class="control-group">
        <h3>Layers</h3>
        <div class="layer-toggle">
          <input type="checkbox" id="layer-walkability" />
          <label for="layer-walkability">Walkability</label>
          <span class="shortcut">W</span>
        </div>
        <div class="layer-toggle">
          <input type="checkbox" id="layer-walls" />
          <label for="layer-walls">Wall Edges</label>
          <span class="shortcut">E</span>
        </div>
        <div class="layer-toggle">
          <input type="checkbox" id="layer-grid" />
          <label for="layer-grid">Region Grid</label>
          <span class="shortcut">G</span>
        </div>
        <div class="layer-toggle">
          <input type="checkbox" id="layer-tile-grid" />
          <label for="layer-tile-grid">Tile Grid</label>
          <span class="shortcut">T</span>
        </div>
        <div class="layer-toggle">
          <input type="checkbox" id="layer-transitions" />
          <label for="layer-transitions">Transitions</label>
          <span class="shortcut">R</span>
        </div>
        <div id="transition-filters" style="display:none; margin-left:20px; border-left:2px solid #0f3460; padding-left:8px; margin-top:4px;">
          <div class="layer-toggle"><input type="checkbox" class="trans-filter" data-types="DOOR,PASSAGE,WALL_PASSAGE,ENTRANCE" checked /><span class="filter-dot" style="background:#66ff66;"></span><label style="font-size:11px;">Doors & Passages</label></div>
          <div class="layer-toggle"><input type="checkbox" class="trans-filter" data-types="STAIRCASE" checked /><span class="filter-dot" style="background:#00ccff;"></span><label style="font-size:11px;">Staircases</label></div>
          <div class="layer-toggle"><input type="checkbox" class="trans-filter" data-types="AGILITY" checked /><span class="filter-dot" style="background:#ffff00;"></span><label style="font-size:11px;">Agility</label></div>
          <div class="layer-toggle"><input type="checkbox" class="trans-filter" data-types="LODESTONE" checked /><span class="filter-dot" style="background:#ffffff;"></span><label style="font-size:11px;">Lodestones</label></div>
          <div class="layer-toggle"><input type="checkbox" class="trans-filter" data-types="ITEM_TELEPORT" checked /><span class="filter-dot" style="background:#ff88cc;"></span><label style="font-size:11px;">Item Teleports</label></div>
          <div class="layer-toggle"><input type="checkbox" class="trans-filter" data-types="TELEPORT,PORTAL" checked /><span class="filter-dot" style="background:#cc66ff;"></span><label style="font-size:11px;">Teleports & Portals</label></div>
          <div class="layer-toggle"><input type="checkbox" class="trans-filter" data-types="FAIRY_RING" checked /><span class="filter-dot" style="background:#00ff88;"></span><label style="font-size:11px;">Fairy Rings</label></div>
          <div class="layer-toggle"><input type="checkbox" class="trans-filter" data-types="SPIRIT_TREE" checked /><span class="filter-dot" style="background:#88ff00;"></span><label style="font-size:11px;">Spirit Trees</label></div>
          <div class="layer-toggle"><input type="checkbox" class="trans-filter" data-types="MINE_CART,GNOME_GLIDER,BOAT,CHARTER_SHIP,MAGIC_CARPET,CANOE,EAGLE,BALLOON,WILDERNESS_OBELISK,TRANSPORT,NPC_TRANSPORT,BRIDGE" checked /><span class="filter-dot" style="background:#ffaa00;"></span><label style="font-size:11px;">Transport</label></div>
          <div class="layer-toggle"><input type="checkbox" class="trans-filter" data-types="OTHER" checked /><span class="filter-dot" style="background:#ff6644;"></span><label style="font-size:11px;">Other</label></div>
        </div>
        <div class="layer-toggle" style="margin-top: 8px; border-top: 1px solid #1a3a5c; padding-top: 6px;">
          <input type="checkbox" id="toggle-player" />
          <span class="filter-dot" style="background:#1e90ff;"></span>
          <label for="toggle-player">Live Player</label>
        </div>
        <div class="layer-toggle" style="margin-left: 20px;">
          <input type="checkbox" id="toggle-follow" />
          <label for="toggle-follow" style="font-size:11px;">Follow Player</label>
          <span class="shortcut">F</span>
        </div>
        <div class="layer-toggle">
          <input type="checkbox" id="toggle-confirmed" />
          <span class="filter-dot" style="background:#00ff66;"></span>
          <label for="toggle-confirmed">Confirmed In-Game</label>
        </div>
      </div>

      <div class="control-group" id="calibration-group" style="overflow: hidden;">
        <h3 style="cursor: pointer; user-select: none;" id="calibration-toggle">Calibration <span style="font-size: 10px; color: #666; float: right;">locked</span></h3>
        <div id="calibration-body" style="display: none;">

          <div class="offset-row">
            <label>X:</label>
            <button class="offset-btn" data-axis="x" data-delta="-8">-8</button>
            <button class="offset-btn" data-axis="x" data-delta="-1">-1</button>
            <span class="offset-value" id="offset-x-val">0</span>
            <button class="offset-btn" data-axis="x" data-delta="1">+1</button>
            <button class="offset-btn" data-axis="x" data-delta="8">+8</button>
          </div>

          <div class="offset-row">
            <label>Y:</label>
            <button class="offset-btn" data-axis="y" data-delta="-8">-8</button>
            <button class="offset-btn" data-axis="y" data-delta="-1">-1</button>
            <span class="offset-value" id="offset-y-val">0</span>
            <button class="offset-btn" data-axis="y" data-delta="1">+1</button>
            <button class="offset-btn" data-axis="y" data-delta="8">+8</button>
          </div>

          <div style="margin-top: 6px;">
            <div class="flip-toggle">
              <input type="checkbox" id="flip-y" />
              <label for="flip-y">Flip Y-axis</label>
            </div>
            <div class="flip-toggle">
              <input type="checkbox" id="flip-x" />
              <label for="flip-x">Flip X-axis</label>
            </div>
            <div class="flip-toggle">
              <input type="checkbox" id="swap-xy" />
              <label for="swap-xy">Swap X/Y in data</label>
            </div>
          </div>

          <button class="offset-btn" id="reset-offset" style="width: 100%; margin-top: 6px; padding: 5px;">
            Reset All Offsets
          </button>
        </div>
      </div>

      <div class="control-group">
        <h3>Overlay Opacity</h3>
        <div style="display: flex; align-items: center; gap: 8px;">
          <label style="font-size: 11px; width: 60px;">Walkability</label>
          <input type="range" id="opacity-walkability" min="0" max="100" value="40" style="flex: 1;" />
          <span id="opacity-walkability-val" style="font-size: 11px; width: 30px;">40%</span>
        </div>
        <div style="display: flex; align-items: center; gap: 8px; margin-top: 4px;">
          <label style="font-size: 11px; width: 60px;">Walls</label>
          <input type="range" id="opacity-walls" min="0" max="100" value="80" style="flex: 1;" />
          <span id="opacity-walls-val" style="font-size: 11px; width: 30px;">80%</span>
        </div>
      </div>

      <div class="control-group" id="tile-info">
        <h3>Tile Info (click map)</h3>
        <div id="tile-info-content" style="font-size: 11px; color: #666;">Click a tile to inspect</div>
        <div id="transition-list"></div>
        <div id="add-toggle" style="display:none;">+ Add Transition</div>
        <div id="add-transition-form" style="display:none;">
          <div class="form-row">
            <label>Type</label>
            <select id="add-type">
              <option>DOOR</option><option>STAIRCASE</option><option>PASSAGE</option>
              <option>WALL_PASSAGE</option><option>ENTRANCE</option><option>AGILITY</option>
              <option>TELEPORT</option><option>PORTAL</option><option>TRANSPORT</option>
              <option>NPC_TRANSPORT</option><option>ITEM_TELEPORT</option><option>LODESTONE</option>
              <option>FAIRY_RING</option><option>SPIRIT_TREE</option><option>BRIDGE</option>
              <option>MINE_CART</option><option>GNOME_GLIDER</option><option>BOAT</option>
              <option>CHARTER_SHIP</option><option>MAGIC_CARPET</option><option>CANOE</option>
              <option>EAGLE</option><option>BALLOON</option><option>WILDERNESS_OBELISK</option>
            </select>
          </div>
          <div class="form-row">
            <label>Name</label>
            <input type="text" id="add-name" placeholder="Object name" />
          </div>
          <div class="form-row">
            <label>Option</label>
            <input type="text" id="add-option" placeholder="e.g. Open, Climb-up" />
          </div>
          <div class="form-row">
            <label>Dst X</label>
            <input type="number" id="add-dst-x" />
          </div>
          <div class="form-row">
            <label>Dst Y</label>
            <input type="number" id="add-dst-y" />
          </div>
          <div class="form-row">
            <label>Dst P</label>
            <input type="number" id="add-dst-p" value="0" />
          </div>
          <div class="form-row">
            <label>Cost</label>
            <input type="number" id="add-cost" value="1" />
          </div>
          <div class="form-row" style="padding: 2px 0;">
            <label>Bidir</label>
            <input type="checkbox" id="add-bidir" />
          </div>
          <button id="add-transition-btn">Add Transition</button>
        </div>
      </div>
    </div>

    <div id="map-container">
      <div id="map"></div>
      <div id="move-mode-banner" style="display:none;">
        <span id="move-mode-label"></span>
        <button id="move-mode-cancel">Cancel (Esc)</button>
      </div>
      <div id="status-bar">
        <span><span class="coord">World:</span> <span class="value" id="coord-world">-</span></span>
        <span><span class="coord">Tile:</span> <span class="value" id="coord-tile">-</span></span>
        <span><span class="coord">Region:</span> <span class="value" id="coord-region">-</span></span>
        <span><span class="coord">Local:</span> <span class="value" id="coord-local">-</span></span>
        <span><span class="coord">Plane:</span> <span class="value" id="coord-plane">0</span></span>
        <span><span class="coord">Zoom:</span> <span class="value" id="coord-zoom">-</span></span>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
